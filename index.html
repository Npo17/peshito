<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Si mi mama fuese una pesha y mi papa fuese un pesho..." />
  <title>Peshito · experiencia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="nebula" aria-hidden="true"></canvas>
  <canvas id="particles" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <main class="stage">
    <section class="intro" id="intro" aria-labelledby="hook-text">
      <p class="hook" id="hook-text">
        <span class="hook__inner" id="hookTyped"></span><span class="cursor" id="hookCursor" aria-hidden="true"></span>
      </p>
      <button type="button" class="cta" id="cta" disabled>
        <span class="cta__glow"></span>
        <span class="cta__label">yo que sería?</span>
        <span class="cta__border"></span>
      </button>
    </section>

    <section class="reveal" id="reveal" hidden aria-live="polite">
      <h1 class="reveal__title" id="revealTitle"></h1>
      <div class="reveal__frame">
        <div class="reveal__scan"></div>
        <img
          id="puppy"
          class="reveal__img"
          src="https://images.unsplash.com/photo-1530281700549-e82e7bf010d9?auto=format&fit=crop&w=900&q=85"
          alt="Perrito tierno mirando a cámara"
          width="900"
          height="600"
          decoding="async"
        />
      </div>
    </section>
  </main>

  <canvas id="confetti" aria-hidden="true"></canvas>
  <script src="app.js"></script>
</body>
</html>
